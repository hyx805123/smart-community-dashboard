<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警管理 - 智慧社区监控大屏</title>
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <script src="../assets/js/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #1a1a1a, #2d2d2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }



        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            color: #1890ff;
        }

        .nav-item:hover {
            background-color: #3d3d3d;
        }

        .nav-item.active {
            background-color: #4a4a4a;
            border-left: 4px solid #1890ff;
        }

        .main-content {
            flex: 1;
            margin-left: 200px;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        .alarm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .alarm-card {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }

        .alarm-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-critical {
            background-color: #ff4d4f;
        }

        .status-warning {
            background-color: #faad14;
        }

        .status-normal {
            background-color: #52c41a;
        }

        .alarm-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alarm-chart {
            height: 300px;
            margin-top: 20px;
        }

        .alarm-list {
            margin-top: 30px;
        }

        .alarm-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .alarm-table th,
        .alarm-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .alarm-table th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: normal;
        }

        .alarm-level {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .level-critical {
            background-color: rgba(255, 77, 79, 0.2);
            color: #ff4d4f;
        }

        .level-warning {
            background-color: rgba(250, 173, 20, 0.2);
            color: #faad14;
        }

        .level-info {
            background-color: rgba(24, 144, 255, 0.2);
            color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../assets/logo.svg" alt="智慧社区">
            <h2>智慧社区</h2>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="../index.html"><i class="fas fa-chart-line"></i><span>社区概况</span></a></li>
            <li class="nav-item"><a href="monitor.html"><i class="fas fa-video"></i><span>实时监控</span></a></li>
            <li class="nav-item"><a href="device.html"><i class="fas fa-tools"></i><span>设备管理</span></a></li>
            <li class="nav-item active"><a href="alarm.html"><i class="fas fa-bell"></i><span>告警管理</span></a></li>
            <li class="nav-item"><a href="people.html"><i class="fas fa-users"></i><span>人员信息</span></a></li>
            <li class="nav-item"><a href="house.html"><i class="fas fa-home"></i><span>房屋信息</span></a></li>
            <li class="nav-item"><a href="car.html"><i class="fas fa-car"></i><span>车辆信息</span></a></li>
            <li class="nav-item"><a href="patrol.html"><i class="fas fa-shield-alt"></i><span>巡更管理</span></a></li>
            <li class="nav-item"><a href="repair.html"><i class="fas fa-wrench"></i><span>报修管理</span></a></li>
            <li class="nav-item"><a href="notice.html"><i class="fas fa-bullhorn"></i><span>公告信息</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>告警管理</h1>
        </div>

        <div class="alarm-grid">
            <div class="alarm-card">
                <h3>告警统计</h3>
                <div class="alarm-info">
                    <div>
                        <h4>今日告警</h4>
                        <p style="font-size: 24px;">15</p>
                    </div>
                    <div>
                        <h4>待处理</h4>
                        <p style="font-size: 24px; color: #ff4d4f;">8</p>
                    </div>
                    <div>
                        <h4>已处理</h4>
                        <p style="font-size: 24px; color: #52c41a;">7</p>
                    </div>
                </div>
            </div>

            <div class="alarm-card">
                <h3>告警趋势</h3>
                <div id="alarmTrendChart" class="alarm-chart"></div>
            </div>

            <div class="alarm-card">
                <h3>告警类型分布</h3>
                <div id="alarmTypeChart" class="alarm-chart"></div>
            </div>
        </div>

        <div class="alarm-list alarm-card">
            <h3>告警列表</h3>
            <table class="alarm-table">
                <thead>
                    <tr>
                        <th>告警时间</th>
                        <th>告警类型</th>
                        <th>告警级别</th>
                        <th>告警位置</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2024-01-20 10:30:15</td>
                        <td>设备离线</td>
                        <td><span class="alarm-level level-critical">紧急</span></td>
                        <td>A区大门</td>
                        <td>待处理</td>
                    </tr>
                    <tr>
                        <td>2024-01-20 10:28:45</td>
                        <td>异常行为</td>
                        <td><span class="alarm-level level-warning">警告</span></td>
                        <td>B区停车场</td>
                        <td>处理中</td>
                    </tr>
                    <tr>
                        <td>2024-01-20 10:25:30</td>
                        <td>温度异常</td>
                        <td><span class="alarm-level level-info">提示</span></td>
                        <td>C栋配电室</td>
                        <td>已处理</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 告警趋势图表
        const alarmTrendChart = echarts.init(document.getElementById('alarmTrendChart'));
        alarmTrendChart.setOption({
            tooltip: {
                trigger: 'axis'
            },
            legend: {
                data: ['紧急告警', '警告', '提示'],
                textStyle: {
                    color: '#fff'
                }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true
            },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00', '24:00'],
                axisLine: {
                    lineStyle: {
                        color: '#fff'
                    }
                }
            },
            yAxis: {
                type: 'value',
                axisLine: {
                    lineStyle: {
                        color: '#fff'
                    }
                },
                splitLine: {
                    lineStyle: {
                        color: 'rgba(255, 255, 255, 0.1)'
                    }
                }
            },
            series: [
                {
                    name: '紧急告警',
                    type: 'line',
                    stack: 'Total',
                    data: [3, 2, 4, 5, 3, 2, 1],
                    itemStyle: {
                        color: '#ff4d4f'
                    }
                },
                {
                    name: '警告',
                    type: 'line',
                    stack: 'Total',
                    data: [5, 4, 6, 4, 5, 3, 2],
                    itemStyle: {
                        color: '#faad14'
                    }
                },
                {
                    name: '提示',
                    type: 'line',
                    stack: 'Total',
                    data: [7, 5, 8, 6, 4, 5, 3],
                    itemStyle: {
                        color: '#1890ff'
                    }
                }
            ]
        });

        // 告警类型分布图表
        const alarmTypeChart = echarts.init(document.getElementById('alarmTypeChart'));
        alarmTypeChart.setOption({
            tooltip: {
                trigger: 'item'
            },
            legend: {
                top: '5%',
                left: 'center',
                textStyle: {
                    color: '#fff'
                }
            },
            series: [{
                name: '告警类型',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: {
                    show: false,
                    position: 'center'
                },
                emphasis: {
                    label: {
                        show: true,
                        fontSize: '20',
                        fontWeight: 'bold'
                    }
                },
                labelLine: {
                    show: false
                },
                data: [
                    { value: 35, name: '设备离线', itemStyle: { color: '#ff4d4f' } },
                    { value: 25, name: '异常行为', itemStyle: { color: '#faad14' } },
                    { value: 20, name: '温度异常', itemStyle: { color: '#1890ff' } },
                    { value: 15, name: '非法闯入', itemStyle: { color: '#722ed1' } },
                    { value: 10, name: '其他', itemStyle: { color: '#13c2c2' } }
                ]
            }]
        });

        // 响应窗口大小变化
        window.addEventListener('resize', function() {
            alarmTrendChart.resize();
            alarmTypeChart.resize();
        });
    </script>
</body>
</html>
