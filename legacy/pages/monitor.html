<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控 - 智慧社区监控大屏</title>
    <link rel="stylesheet" href="../assets/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <script src="../assets/js/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #1a1a1a, #2d2d2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }



        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            color: #1890ff;
        }

        .nav-item:hover {
            background-color: #3d3d3d;
        }

        .nav-item.active {
            background-color: #4a4a4a;
            border-left: 4px solid #1890ff;
        }

        .main-content {
            flex: 1;
            margin-left: 200px;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .monitor-card {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 20px;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s;
            position: relative;
        }

        .monitor-card:hover {
            transform: scale(1.02);
        }

        .camera-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .camera-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-online {
            background-color: #52c41a;
        }

        .status-offline {
            background-color: #ff4d4f;
        }

        .video-placeholder {
            width: 100%;
            height: calc(100% - 40px);
            background: #1a1a1a;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="../assets/logo.svg" alt="智慧社区">
            <h2>智慧社区</h2>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="../index.html"><i class="fas fa-chart-line"></i><span>社区概况</span></a></li>
            <li class="nav-item active"><a href="monitor.html"><i class="fas fa-video"></i><span>实时监控</span></a></li>
            <li class="nav-item"><a href="device.html"><i class="fas fa-tools"></i><span>设备管理</span></a></li>
            <li class="nav-item"><a href="alarm.html"><i class="fas fa-bell"></i><span>告警管理</span></a></li>
            <li class="nav-item"><a href="people.html"><i class="fas fa-users"></i><span>人员信息</span></a></li>
            <li class="nav-item"><a href="house.html"><i class="fas fa-home"></i><span>房屋信息</span></a></li>
            <li class="nav-item"><a href="car.html"><i class="fas fa-car"></i><span>车辆信息</span></a></li>
            <li class="nav-item"><a href="patrol.html"><i class="fas fa-shield-alt"></i><span>巡更管理</span></a></li>
            <li class="nav-item"><a href="repair.html"><i class="fas fa-wrench"></i><span>报修管理</span></a></li>
            <li class="nav-item"><a href="notice.html"><i class="fas fa-bullhorn"></i><span>公告信息</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>实时监控</h1>
        </div>

        <div class="monitor-grid">
            <div class="monitor-card">
                <div class="camera-info">
                    <h3>大门监控点</h3>
                    <div class="camera-status">
                        <div class="status-dot status-online"></div>
                        <span>在线</span>
                    </div>
                </div>
                <div class="video-placeholder">
                    <i class="fas fa-video fa-3x" style="color: #666;"></i>
                </div>
            </div>

            <div class="monitor-card">
                <div class="camera-info">
                    <h3>停车场监控点</h3>
                    <div class="camera-status">
                        <div class="status-dot status-online"></div>
                        <span>在线</span>
                    </div>
                </div>
                <div class="video-placeholder">
                    <i class="fas fa-video fa-3x" style="color: #666;"></i>
                </div>
            </div>

            <div class="monitor-card">
                <div class="camera-info">
                    <h3>小区公园监控点</h3>
                    <div class="camera-status">
                        <div class="status-dot status-offline"></div>
                        <span>离线</span>
                    </div>
                </div>
                <div class="video-placeholder">
                    <i class="fas fa-video-slash fa-3x" style="color: #666;"></i>
                </div>
            </div>

            <div class="monitor-card">
                <div class="camera-info">
                    <h3>儿童游乐场监控点</h3>
                    <div class="camera-status">
                        <div class="status-dot status-online"></div>
                        <span>在线</span>
                    </div>
                </div>
                <div class="video-placeholder">
                    <i class="fas fa-video fa-3x" style="color: #666;"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
