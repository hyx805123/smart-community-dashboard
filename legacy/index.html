<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧社区监控大屏</title>
    <link rel="stylesheet" href="assets/css/common.css">
    <script src="assets/js/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes fadeNumber {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(-45deg, #1a1a1a, #2d2d2d, #1a1a1a, #2d2d2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        .sidebar {
            width: 200px;
            background-color: #2d2d2d;
            padding: 20px 0;
            height: 100vh;
            position: fixed;
            left: 0;
        }

        .logo {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #3d3d3d;
            margin-bottom: 20px;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            color: #1890ff;
        }

        .nav-item:hover {
            background-color: #3d3d3d;
        }

        .nav-item.active {
            background-color: #4a4a4a;
            border-left: 4px solid #1890ff;
        }

        .main-content {
            flex: 1;
            margin-left: 200px;
            padding: 20px;
        }

        .header {
            margin-bottom: 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            will-change: transform;
            overflow: hidden;
            padding: 10px;
        }

        .card {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            height: 300px;
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            position: relative;
            will-change: transform;
            overflow: hidden;
            padding: 10px;
        }

        .monitor-card {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 20px;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .monitor-card:hover {
            transform: translateY(-5px) scale(1.02);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #1890ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .monitor-preview {
            width: 100%;
            height: calc(100% - 50px);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .monitor-preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: scanline 3s infinite linear;
        }

        @keyframes scanline {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .monitor-preview::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23000" opacity="0.5"/><text x="50" y="50" font-family="Arial" font-size="10" fill="%23fff" text-anchor="middle" dy=".3em">NO SIGNAL</text></svg>') center/cover;
        }

        .card-content {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(24, 144, 255, 0.5);
            animation: fadeNumber 2s infinite;
            transform-style: preserve-3d;
            perspective: 1000px;
            margin-bottom: 10px;
        }

        .trend-chart {
            text-align: right;
            font-size: 20px;
        }

        .text-success { color: #52c41a; }
        .text-info { color: #1890ff; }
        .text-warning { color: #faad14; }
        .text-primary { color: #722ed1; }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            position: relative;
            padding: 20px;
            margin-top: 20px;
        }

        .monitor-card {
            background: rgba(45, 45, 45, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 20px;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            will-change: transform;
        }

        .monitor-card:hover {
            transform: translateY(-5px) scale(1.02);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-online {
            background-color: #52c41a;
        }

        .status-offline {
            background-color: #ff4d4f;
        }

        .time-weather {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.85);
        }

        .time {
            font-family: 'Consolas', monospace;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weather::before {
            content: '☀️';
            font-size: 20px;
        }

        @media screen and (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .nav-item span {
                display: none;
            }

            .main-content {
                margin-left: 60px;
            }
        }
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #1890ff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transition: transform 0.2s;
            z-index: 9999;
        }

        .cursor-glow {
            width: 40px;
            height: 40px;
            background: rgba(24, 144, 255, 0.2);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transition: transform 0.3s, width 0.3s, height 0.3s;
            z-index: 9998;
        }
    </style>
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-glow"></div>
    <div class="sidebar">
        <div class="logo">
            <img src="assets/logo.svg" alt="智慧社区">
            <h2>智慧社区</h2>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active"><a href="index.html"><i class="fas fa-chart-line"></i><span>社区概况</span></a></li>
            <li class="nav-item"><a href="pages/monitor.html"><i class="fas fa-video"></i><span>实时监控</span></a></li>
            <li class="nav-item"><a href="pages/device.html"><i class="fas fa-tools"></i><span>设备管理</span></a></li>
            <li class="nav-item"><a href="pages/alarm.html"><i class="fas fa-bell"></i><span>告警管理</span></a></li>
            <li class="nav-item"><a href="pages/people.html"><i class="fas fa-users"></i><span>人员信息</span></a></li>
            <li class="nav-item"><a href="pages/house.html"><i class="fas fa-home"></i><span>房屋信息</span></a></li>
            <li class="nav-item"><a href="pages/car.html"><i class="fas fa-car"></i><span>车辆信息</span></a></li>
            <li class="nav-item"><a href="pages/patrol.html"><i class="fas fa-shield-alt"></i><span>巡更管理</span></a></li>
            <li class="nav-item"><a href="pages/repair.html"><i class="fas fa-wrench"></i><span>报修管理</span></a></li>
            <li class="nav-item"><a href="pages/notice.html"><i class="fas fa-bullhorn"></i><span>公告信息</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>社区概况</h1>
            <div class="time-weather">
                <div class="time" id="currentTime"></div>
                <div class="weather">晴 26°C</div>
            </div>
        </div>

        <script>
            // 鼠标特效
            const cursor = document.querySelector('.cursor');
            const cursorGlow = document.querySelector('.cursor-glow');

            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorGlow.style.left = e.clientX - 10 + 'px';
                cursorGlow.style.top = e.clientY - 10 + 'px';
            });

            document.querySelectorAll('.card, .monitor-card, .nav-item').forEach(element => {
                element.addEventListener('mouseenter', () => {
                    cursor.style.transform = 'scale(1.5)';
                    cursorGlow.style.width = '60px';
                    cursorGlow.style.height = '60px';
                    element.style.cursor = 'none';
                });

                element.addEventListener('mouseleave', () => {
                    cursor.style.transform = 'scale(1)';
                    cursorGlow.style.width = '40px';
                    cursorGlow.style.height = '40px';
                });
            });

            function updateTime() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
                document.getElementById('currentTime').textContent = timeStr;
            }
            setInterval(updateTime, 1000);
            updateTime();
        </script>

        <script>
            // 初始化人口趋势图表
            var populationChart = echarts.init(document.getElementById('populationChart'));
            var populationOption = {
                grid: {
                    top: 10,
                    right: 10,
                    bottom: 20,
                    left: 40,
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: { color: '#fff' }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: { color: '#fff' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    data: [2100, 2150, 2200, 2250, 2300, 2345],
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    itemStyle: { color: '#52c41a' },
                    lineStyle: { width: 3 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(82,196,26,0.3)' },
                            { offset: 1, color: 'rgba(82,196,26,0)' }
                        ])
                    }
                }]
            };
            populationChart.setOption(populationOption);

            // 初始化户数趋势图表
            var householdChart = echarts.init(document.getElementById('householdChart'));
            var householdOption = {
                grid: {
                    top: 10,
                    right: 10,
                    bottom: 20,
                    left: 40,
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: ['1月', '2月', '3月', '4月', '5月', '6月'],
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: { color: '#fff' }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: { color: '#fff' },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    data: [1000, 1050, 1100, 1150, 1180, 1200],
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 8,
                    itemStyle: { color: '#1890ff' },
                    lineStyle: { width: 3 },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(24,144,255,0.3)' },
                            { offset: 1, color: 'rgba(24,144,255,0)' }
                        ])
                    }
                }]
            };
            householdChart.setOption(householdOption);

            // 窗口大小改变时，重置图表大小
            window.addEventListener('resize', function() {
                populationChart.resize();
                householdChart.resize();
            });
        </script>

        <div class="dashboard-grid">
            <div class="card">
                <div class="card-title"><i class="fas fa-users"></i> 常住人口</div>
                <div class="card-content">2,345人</div>
                <div id="populationChart" style="height: 200px;"></div>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-home"></i> 总户数</div>
                <div class="card-content">1,200户</div>
                <div id="householdChart" style="height: 200px;"></div>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-car"></i> 车位使用率</div>
                <div class="card-content">85%</div>
                <div class="trend-chart"><i class="fas fa-chart-pie text-warning"></i></div>
            </div>
            <div class="card">
                <div class="card-title"><i class="fas fa-server"></i> 设备在线率</div>
                <div class="card-content">98.5%</div>
                <div class="trend-chart"><i class="fas fa-chart-area text-primary"></i></div>
            </div>
        </div>

        <div class="monitor-grid">
            <div class="monitor-card">
                <div class="card-title">监控设备状态</div>
                <div class="status-list">
                    <div><span class="status-indicator status-online"></span>大门监控 - 在线</div>
                    <div><span class="status-indicator status-online"></span>停车场监控 - 在线</div>
                    <div><span class="status-indicator status-offline"></span>后门监控 - 离线</div>
                </div>
            </div>
            <div class="monitor-card">
                <div class="card-title">今日访客统计</div>
                <!-- 此处可添加访客统计图表 -->
            </div>
            <div class="monitor-card">
                <div class="card-title">设备告警统计</div>
                <!-- 此处可添加告警统计图表 -->
            </div>
            <div class="monitor-card">
                <div class="card-title">车辆进出记录</div>
                <!-- 此处可添加车辆记录列表 -->
            </div>
        </div>
    </div>
</body>
</html>
